<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            border: 1px solid black;
            margin: 10px;
        }
        .Section1{
            background-color: yellowgreen;
            position: absolute;
            z-index: 5;
        }
        .Section2{
            background-color: yellow;
            position: absolute;
            top: 50px;
            left: 50px;
            z-index: 4;
        }
        .Section3{
            background-color: lightblue;
            position: absolute;
            top: 100px;
            left: 100px;
            z-index: 3;
        }
        .Section4{
            background-color: lightcoral;
            position: absolute;
            top: 150px;
            left: 150px;
            z-index: 2;
        }
        .Section5{
            background-color: lightgray;
            position: absolute;
            top: 200px;
            left: 200px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="Section1"></div>
    <div class="Section2"></div>
    <div class="Section3"></div>
    <div class="Section4"></div>
    <div class="Section5"></div>
</body>
</html>
