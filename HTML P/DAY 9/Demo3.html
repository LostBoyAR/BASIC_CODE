<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            width: 100%;
        }
        th, td{
            border: 2px solid black;
        }
        th{
            background-color: rgb(94, 20, 20);
            color: white;
        }
        tr:nth-child(odd){
            background-color: rgb(187, 186, 186);
        }
        tr:hover{
            background-color: rgb(185, 112, 112);
        }

    </style>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Age</th>
            <th>Email Address</th>
        </tr>
        <tr>
            <td>Aditya</td>
            <td>195</td>
            <td>21</td>
            <td>aditya@example.com</td>
        </tr>
        <tr>
            <td>Piyush</td>
            <td>197</td>
            <td>22</td>
            <td>piyush@example.com</td>
        </tr>
        <tr>
            <td>Raja</td>
            <td>183</td>
            <td>25</td>
            <td>raja@example.com</td>
        </tr>
        <tr>
            <td>Rudra</td>
            <td>222</td>
            <td>23</td>
            <td>rudra@example.com</td>
        </tr>
    </table>
</body>
</html>
