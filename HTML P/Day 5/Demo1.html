<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- if uploading any file, then we must use enctype="multipart/form-data" in form tag and method must be post, otherwise file will not be uploaded to server and we will get error in console. -->
    <form name="UserDataForm" id="UserDataForm" method="post" enctype="multipart/form-data" action="">
        <label for="FullName">Full Name :</label>
        <input type="text" name="FullName" id="FullName">
        <br><br>
        <label for="UserEmail">Email Address :</label>
        <input type="email" name="UserEmail" id="UserEmail">
        <br><br>
        <label>Select Topic :</label>
        <input type="checkbox" name="ck1" id="ck1" value="HTML">
        <label for="ck1">HTML</label>
        <input type="checkbox" name="ck2" id="ck2" value="CSS">
        <label for="ck2">CSS</label>    
        <input type="checkbox" name="ck3" id="ck3" value="JavaScript">
        <label for="ck3">JavaScript</label>
        <br><br>
        <label for="dod">Date of Birth :</label>
        <input type="date" name="dod" id="dod">
        <br><br>
        <input type="color">
        <br><br>
        <label for="filedata">Select File for Upload :</label><br>
        <input type="file" name="filedata" id="filedata">
        <br><br>
        <label for="Age">Age :</label>
        <input type="number" name="Age" id="Age" min="1" max="25" value="20">
        <br><br>
        <input type="reset">
        <br><br>
        <input type="submit" name="AddRecord" value="Add Record !!!!">
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d458534.9402722542!2d85.359515!3d26.121622!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39ed10cde2a33e53%3A0x684909dbc481698b!2sL.N.%20Mishra%20College%20Of%20Business%20Management!5e0!3m2!1sen!2sus!4v1774424300001!5m2!1sen!2sus" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="fast" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </form>
</body>
</html>
