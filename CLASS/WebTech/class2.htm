<!-- write a simple embadded css programe . -->

<html>
<head>
    <title>Embedded CSS Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        h1 {
            color: purple;
            text-align: center;
        }
        p {
            font-size: 18px;
            color: darkred;
        }
        button {
            background-color: teal;
            color: white;
            padding: 12px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Welcome to Embedded CSS Example</h1>
    <p>This is a paragraph styled using embedded CSS.</p>
    <button>Click Me!</button>
</body>
</html>
